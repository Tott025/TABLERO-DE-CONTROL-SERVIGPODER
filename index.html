<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Control de Accesos</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Dashboard de Control de Accesos</h1>
      <div class="estado">SISTEMA EN LÍNEA</div>
    </header>

    <div class="top-controls">
      <div class="control-card">
        <h3>Actualización automática</h3>
        <button onclick="loadData()">Actualizar ahora</button>
        <p id="ultimaActualizacion"></p>
      </div>

      <div class="control-card">
        <h3>Filtrar por fecha</h3>
        <input type="date" id="fechaInicio">
        <input type="date" id="fechaFin">
        <button onclick="filtrarFechas()">Aplicar filtro</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <h4>PERSONAS EN SITIO</h4>
        <h2 id="personasSitio">0</h2>
      </div>
      <div class="card">
        <h4>TOTAL REGISTROS</h4>
        <h2 id="totalRegistros">0</h2>
      </div>
      <div class="card">
        <h4>ESTANCIA PROMEDIO</h4>
        <h2 id="estanciaPromedio">0 h</h2>
      </div>
      <div class="card">
        <h4>EFECTIVIDAD</h4>
        <h2 id="efectividad">0%</h2>
      </div>
    </div>

    <div class="graficas">
      <div class="chart-card">
        <canvas id="areasChart"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="horasChart"></canvas>
      </div>
    </div>

    <div class="tabla-card">
      <table id="tablaDatos">
        <thead>
          <tr>
            <th>FECHA</th>
            <th>INGRESO</th>
            <th>VISITANTE</th>
            <th>ÁREA</th>
            <th>SALIDA</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
