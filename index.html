<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Control de Accesos</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="container">

  <header>
    <div>
      <h1>Dashboard de Control de Accesos</h1>
      <p id="periodo"></p>
    </div>

    <div class="estado">
      SISTEMA EN LINEA
    </div>
  </header>

  <div class="top-controls">

    <div class="card control-card">
      <h3>Actualizaciˇn automßtica</h3>

      <button onclick="loadData()">Actualizar ahora</button>

      <p id="ultimaActualizacion"></p>
    </div>

    <div class="card control-card">
      <h3>Filtrar por fecha</h3>

      <input type="date" id="fechaInicio">
      <input type="date" id="fechaFin">

      <button onclick="filtrarFechas()">
        Aplicar filtro
      </button>
    </div>

  </div>

  <div class="cards">

    <div class="card">
      <h4>PERSONAS EN SITIO</h4>
      <h2 id="personasSitio">0</h2>
    </div>

    <div class="card">
      <h4>TOTAL REGISTROS</h4>
      <h2 id="totalRegistros">0</h2>
    </div>

    <div class="card">
      <h4>ESTANCIA PROMEDIO</h4>
      <h2 id="estanciaPromedio">0 h</h2>
    </div>

    <div class="card">
      <h4>EFECTIVIDAD</h4>
      <h2 id="efectividad">0%</h2>
    </div>

  </div>

  <div class="graficas">

    <div class="card chart-card">
      <canvas id="areasChart"></canvas>
    </div>

    <div class="card chart-card">
      <canvas id="horasChart"></canvas>
    </div>

  </div>

  <div class="card tabla-card">

    <h3>Movimientos recientes</h3>

    <table>
      <thead>
        <tr>
          <th>FECHA</th>
          <th>INGRESO</th>
          <th>VISITANTE</th>
          <th>AREA</th>
          <th>SALIDA</th>
        </tr>
      </thead>

      <tbody id="tablaDatos"></tbody>
    </table>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
